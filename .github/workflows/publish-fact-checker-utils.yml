name: Publish - Fact Checker Utils

on:
  push:
    branches:
      - main
    paths:
      - 'packages/midnight-fact-checker-utils/**'
  workflow_dispatch:
    inputs:
      force:
        description: 'Publish even if version is unchanged (use with caution)'
        type: boolean
        default: false

defaults:
  run:
    working-directory: packages/midnight-fact-checker-utils

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/midnight-fact-checker-utils/package-lock.json

      - name: Check if version changed
        id: version-check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "${PACKAGE_NAME}" version 2>/dev/null || echo "0.0.0")

          echo "local=${LOCAL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "published=${PUBLISHED_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Force publish requested: ${LOCAL_VERSION}"
          elif [ "${LOCAL_VERSION}" != "${PUBLISHED_VERSION}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: ${PUBLISHED_VERSION} -> ${LOCAL_VERSION}"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: ${LOCAL_VERSION}"
          fi

      - name: Install dependencies
        if: steps.version-check.outputs.changed == 'true'
        run: npm ci

      - name: Audit (block on high+ severity)
        if: steps.version-check.outputs.changed == 'true'
        run: npm audit --audit-level=high

      - name: Run tests
        if: steps.version-check.outputs.changed == 'true'
        run: npx vitest run

      - name: Type check
        if: steps.version-check.outputs.changed == 'true'
        run: npx tsc --noEmit

      - name: Build
        if: steps.version-check.outputs.changed == 'true'
        run: npx tsc

      - name: Lock dependency tree for publish (npm-shrinkwrap.json)
        if: steps.version-check.outputs.changed == 'true'
        # Renames package-lock.json to npm-shrinkwrap.json so the locked
        # dep tree ships in the published tarball. Consumers (including
        # `npx`) then install exactly the versions tested in this CI run,
        # not whatever floats up under semver ranges in package.json.
        run: cp package-lock.json npm-shrinkwrap.json

      - name: Inspect tarball contents
        if: steps.version-check.outputs.changed == 'true'
        run: npm pack --dry-run

      - name: Publish to npm with provenance
        if: steps.version-check.outputs.changed == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
