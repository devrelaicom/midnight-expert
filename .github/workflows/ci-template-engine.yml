name: CI - Template Engine

on:
  pull_request:
    branches: ['**']
    paths:
      - 'packages/template-engine/**'
  push:
    branches:
      - main
    paths:
      - 'packages/template-engine/**'

defaults:
  run:
    working-directory: packages/template-engine

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/template-engine/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Biome check
        run: npx biome check .
        working-directory: .

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/template-engine/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Biome format check
        run: npx biome format .
        working-directory: .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/template-engine/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/template-engine/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npx tsc

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/template-engine/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npx vitest run
