name: CI - Template Engine

on:
  pull_request:
    branches: ['**']
    paths:
      - 'packages/template-engine/**'
  push:
    branches:
      - main
    paths:
      - 'packages/template-engine/**'

defaults:
  run:
    working-directory: packages/template-engine

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/template-engine/package-lock.json
      - run: npm ci
      - name: Biome check
        run: npx biome check .
        working-directory: .

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/template-engine/package-lock.json
      - run: npm ci
      - name: Biome format check
        run: npx biome format .
        working-directory: .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/template-engine/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/template-engine/package-lock.json
      - run: npm ci
      - run: npx tsc

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/template-engine/package-lock.json
      - run: npm ci
      - run: npx vitest run

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/template-engine/package-lock.json
      - run: npm ci
      - name: npm audit (high+)
        run: npm audit --audit-level=high
      - name: Inspect tarball contents
        run: npm pack --dry-run
